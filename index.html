<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诛仙世界银两价格走势（8区）</title>
  <script src="echarts.min.js"></script>
  <!-- 内嵌数据，file:// 双击打开也能显示，app.js 每次采集自动更新此文件 -->
  <script src="data.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', system-ui, sans-serif; }
    .header { text-align: center; padding: 20px; }
    .header h1 { font-size: 22px; color: #e94560; }
    .header p { font-size: 13px; color: #888; margin-top: 6px; }
    .stats { display: flex; justify-content: center; gap: 12px; padding: 10px 20px; flex-wrap: wrap; }
    .stat-box { background: #16213e; border-radius: 8px; padding: 10px 16px; text-align: center; min-width: 90px; }
    .stat-box .label { font-size: 12px; color: #888; }
    .stat-box .value { font-size: 18px; font-weight: bold; margin-top: 4px; color: #00d68f; }
    .stat-box .value.high { color: #e94560; }
    .stat-box .value.low { color: #4fc3f7; }
    #chart { width: 100%; height: 65vh; min-height: 400px; padding: 0 10px; }
    .footer { text-align: center; padding: 15px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <h1>诛仙世界银两价格走势（8区）</h1>
    <p>数据来源: 7881.com · 单位: 元/万银 · 点击图例可切换显示</p>
  </div>
  <div class="stats" id="stats"></div>
  <div id="chart"></div>
  <div class="footer">
    <p>每5分钟自动采集 · 去异常挂单均价 · 串行抓取</p>
    <p id="updateTime"></p>
  </div>

<script>
function fmt(v) { return v != null ? v.toFixed(4) : '--'; }

function render(history) {
  const servers = history.servers || {};
  const names = Object.keys(servers);

  // 每个区一个 series
  const series = names.map(name => ({
    name: name,
    type: 'line',
    smooth: true,
    symbol: 'circle',
    symbolSize: 5,
    showSymbol: false,
    data: (servers[name].data || []).map(s => [s.ts, s.avg]),
    lineStyle: { width: 2 },
    emphasis: { focus: 'series' },
  }));

  const chart = echarts.init(document.getElementById('chart'), 'dark');
  const option = {
    backgroundColor: 'transparent',
    color: ['#e94560','#00d68f','#4fc3f7','#ffa500','#b388ff','#ff7eb6','#26c6da','#aed581'],
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      valueFormatter: v => v != null ? Number(v).toFixed(4) + ' 元/万银' : '--',
    },
    legend: {
      data: names, top: 5, type: 'multi',
      textStyle: { color: '#ccc' },
    },
    grid: { left: '8%', right: '5%', bottom: '15%' },
    xAxis: { type: 'time', axisLabel: { color: '#888' } },
    yAxis: { type: 'value', scale: true, name: '元/万银', axisLabel: { color: '#888' } },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { type: 'slider', start: 0, end: 100 },
    ],
    series: series,
  };
  chart.setOption(option);
  window.addEventListener('resize', () => chart.resize());

  // 统计卡片：各区最新均价（从高到低）
  document.getElementById('updateTime').textContent =
    '最后更新: ' + (history.lastUpdate || '--');

  const latest = names.map(n => {
    const arr = servers[n].data || [];
    return { name: n, value: arr.length ? arr[arr.length - 1].avg : null, count: arr.length };
  }).filter(x => x.value != null).sort((a, b) => b.value - a.value);

  const maxV = latest[0]?.value || 0;
  const minV = latest[latest.length - 1]?.value || 0;

  document.getElementById('stats').innerHTML = latest.map(s => {
    let cls = '';
    if (s.value === maxV) cls = 'high';
    else if (s.value === minV) cls = 'low';
    return `<div class="stat-box"><div class="label">${s.name}</div><div class="value ${cls}">${fmt(s.value)}</div></div>`;
  }).join('');
}

function start(history) {
  if (!history || !history.servers || Object.keys(history.servers).length === 0) {
    document.getElementById('chart').innerHTML =
      '<p style="text-align:center;padding-top:100px;color:#666">暂无数据，请先运行 node app.js 采集</p>';
    return;
  }
  render(history);
}

if (window.__HISTORY__) {
  start(window.__HISTORY__);
} else {
  fetch('history.json?t=' + Date.now())
    .then(r => r.json())
    .then(start)
    .catch(() => {
      document.getElementById('chart').innerHTML =
        '<p style="text-align:center;padding-top:100px;color:#666">数据加载失败，请先运行 node app.js</p>';
    });
}
</script>
</body>
</html>
